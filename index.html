<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <center>
      <div class="d-flex flex-column col-4">
        <input
          id="name-input"
          type="text"
          placeholder="Görev adı"
          class="border rounded mt-4"
        />
        <textarea
          name="gorev"
          id="gorev-input"
          placeholder="Görev Açıklaması"
          cols="30"
          rows="10"
          class="my-3 border rounded"
        ></textarea>
        <button class="border-0 bg-success rounded py-2 text-white" id="btn">
          Görev ekle
        </button>
        <button
          class="border-0 bg-danger my-2 rounded py-2 text-white"
          id="delete"
        >
          Bütün görevleri sil
        </button>
      </div>
    </center>

    <center class="mt-4">
      <table>
        <thead>
          <tr class="border">
            <td class="border px-4">Görev adı</td>
            <td class="border px-4">Görev açıklaması</td>
          </tr>
        </thead>
        <tbody id="list">
          <tr id="listItems" class="delete-button"></tr>
        </tbody>
      </table>
    </center>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
